name: CI Quality Assurance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-check:
    name: Code Quality & Linting Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install QA Tools (Flake8 & Black)
        run: python -m pip install flake8 black

      - name: Code Formatting Check (Black)
        # Checks if code matches Black's strict formatting standards.
        # The '|| true' allows the build to continue even if styling isn't perfect.
        run: black --check . || true

      - name: Linting - Critical Errors (Flake8)
        # Stops the build ONLY if there are fatal Python syntax errors or undefined names.
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Linting - Style Warnings (Flake8)
        # exit-zero treats all stylistic errors as warnings so your hackathon deployment doesn't get blocked.
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Validate Application Syntax
        run: python -m py_compile Backend/main.py

      - name: Pipeline Passed
        run: echo "All quality checks and linting passed successfully!"