name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: [bug]

body:
  - type: markdown
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe the issue.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or error logs if available.

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra information.