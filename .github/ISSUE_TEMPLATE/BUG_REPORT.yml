name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Please fill out the details below for reporting the bug.

  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: Clearly describe the issue.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual result.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots, logs, or error messages if available.
      placeholder: Paste logs or drag screenshots here.

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra information that might help investigate the issue.
      placeholder: Additional context...