name: Feature Request
description: Suggest a new feature or enhancement
title: "feature: "
labels: [enhancement]

body:
  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: Describe the feature.
      placeholder: What would you like to add?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?

  - type: textarea
    id: references
    attributes:
      label: References / Mockups
      description: Add screenshots, designs, or links if available.

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes